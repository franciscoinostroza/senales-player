<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Señales</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📡</text></svg>">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>
  <div class="container">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h1>📡 Señales</h1>
        <span class="count" id="channelCount">0</span>
      </div>
      <div class="channel-list" id="channelList"></div>
    </aside>

    <div class="main">
      <div class="video-wrapper">
        <button class="toggle-btn" id="toggleBtn">☰</button>
        <video id="video" playsinline preload="metadata"></video>

        <div class="placeholder" id="placeholder">
          <div class="icon">📡</div>
          <h2>Selecciona un canal</h2>
        </div>

        <div class="spinner hidden" id="spinner"></div>

        <div class="play-btn hidden" id="playOverlay">▶</div>

        <div class="error hidden" id="errorOverlay">
          <p id="errorMsg"></p>
          <button id="retryBtn">Reintentar</button>
        </div>
      </div>

      <div class="controls">
        <button class="ctrl-btn" id="playBtn">▶</button>
        <span class="time" id="time">0:00 / 0:00</span>
        <span class="ctrl-btn" id="volumeBtn">🔊</span>
        <input type="range" class="vol-slider" id="volSlider" min="0" max="100" value="100">
        <button class="ctrl-btn fullscreen" id="fullBtn">⛶</button>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
